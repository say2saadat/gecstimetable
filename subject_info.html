<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Subject Information</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
body {
  margin: 0;
  font-family: Georgia, "Times New Roman", Times, serif;
  background: linear-gradient(120deg, #4facfe, #00f2fe);
  min-height: 100vh;
  display: flex;
  justify-content: center;
  padding: 20px;
}

.card {
  background: white;
  width: 90%;
  max-width: 700px;
  padding: 30px;
  margin: auto;
  border-radius: 12px;
  box-shadow: 0 15px 30px rgba(0,0,0,0.2);
}

h2 {
  text-align: center;
  color: #0b3c5d;
  margin-bottom: 15px;
  font-size:18px;
}

#loading {
  text-align: center;
  font-size: 14px;
  color: #0b3c5d;
  font-weight: bold;
}

.dept-section{
  margin:35px auto;
  max-width:750px;
  text-align:center;
}

.dept-title{
  font-weight:normal;
  color:#1a3a5f;
  padding:4px 0px;
  margin:20px 0 6px 0;
  font-size:15px;
}

.sem-title{
  color:rgb(3, 59, 133);
  padding:6px 0;
  margin:3px 0 2px 0;
  text-align:left;
  font-size:13px;
  width:100%;
}

table{
  width:100%;
  border-collapse:collapse;
}

.table-container{
  width:100%;
  overflow-x:auto;
  margin-top:2px;
}

th,td{
  border:1px solid #cfd8dc;
  padding:6px;
  font-size:13px;
  text-align:left;
}

th{
  background:#169479;
  color:white;
  font-weight:normal;
  text-align:left;
}

tr:nth-child(even){
  background:#f6f9fc;
}

.logo{
display:block;
margin:0 auto 10px auto;
max-width:80px;
}

.college-name{
text-align:center;
font-size:20px;
font-weight:bold;
color:#0b3c5d;
margin-bottom:5px;
}

@media (max-width:600px){
  th,td{
    font-size:12px;
    padding:6px;
  }
}
</style>
</head>

<body>

<div class="card">
<img src="gecs_logo.jpeg" class="logo">

<div class="college-name">
Government Engineering College Sheohar
</div>

<h2>Subject Information</h2>

<div id="loading">Loading Subject information…</div>

<div id="tableWrapper"></div>

</div>

<script>

/* ===== CHANGE THIS WHEN USING JSON ===== */
const API_URL = "data/subject_info.json";

fetch(API_URL)
.then(res => res.json())
.then(data => {

data.sort((a,b)=>{
if(a.Department===b.Department){
return Number(a.Semester)-Number(b.Semester);
}
return a.Department.localeCompare(b.Department);
});

const container = document.getElementById("tableWrapper");

if(!data || data.length===0){
document.getElementById("loading").innerText="No data found";
return;
}

/* ===== GROUP BY DEPARTMENT ===== */

const deptGroups={};

data.forEach(row=>{

const dept=row.Department || "Other";
const sem=row.Semester || "NA";

if(!deptGroups[dept]){
deptGroups[dept]={};
}

if(!deptGroups[dept][sem]){
deptGroups[dept][sem]=[];
}

deptGroups[dept][sem].push(row);

});

let html="";

/* ===== CREATE TABLE FOR EACH DEPARTMENT ===== */

Object.keys(deptGroups).forEach(dept=>{

html+=`
<div class="dept-section">
<h3>${dept}</h3>
`;

Object.keys(deptGroups[dept]).sort((a,b)=>a-b).forEach(sem=>{

html+=`
<h4>Semester ${sem}</h4>

<div class="table-container">
<table>

<thead>
<tr>
<th>Sr</th>
<th>Subject Code</th>
<th>Acronym</th>
<th>Subject Name</th>
<th>Credits</th>
</tr>
</thead>

<tbody>
`;

deptGroups[dept][sem].forEach((sub,i)=>{

html+=`
<tr>
<td>${i+1}</td>
<td>${sub.SubjectCode || ""}</td>
<td>${sub.SubjectAcr || ""}</td>
<td style="text-align:left">${sub.SubjectName || ""}</td>
<td>${sub.Credits || ""}</td>
</tr>
`;

});

html+=`
</tbody>
</table>
</div>
`;

});

html+=`</div>`;

});

container.innerHTML=html;

document.getElementById("loading").style.display="none";

})

.catch(err=>{
document.getElementById("loading").innerText=
"Error loading data. Please try again.";
console.error(err);
});

</script>

</body>
</html>
