<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Subject Information</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
body {
  margin: 0;
  font-family: Arial, Helvetica, sans-serif;
  background: linear-gradient(120deg, #4facfe, #00f2fe);
  min-height: 100vh;
  display: flex;
  justify-content: center;
  padding: 20px;
}

.card {
  background: white;
  width: 80%;
  max-width: 700px;
  padding: 80px;
  border-radius: 12px;
  box-shadow: 0 15px 30px rgba(0,0,0,0.2);
}

h2 {
  text-align: center;
  color: #0b3c5d;
  margin-bottom: 15px;
}

#loading {
  text-align: center;
  font-size: 14px;
  color: #0b3c5d;
  font-weight: bold;
}

.dept-section{
  margin-bottom:35px;
}

.dept-title{
  background:#0b3c5d;
  color:white;
  padding:8px;
  text-align:center;
  border-radius:6px;
  margin-bottom:8px;
  font-size:15px;
}

table{
  width:100%;
  border-collapse:collapse;
}

th,td{
  border:1px solid #cfd8dc;
  padding:8px;
  font-size:13px;
  text-align:center;
}

th{
  background:#0b3c5d;
  color:white;
}

tr:nth-child(even){
  background:#f6f9fc;
}

@media (max-width:600px){
  th,td{
    font-size:12px;
    padding:6px;
  }
}
</style>
</head>

<body>

<div class="card">
<h2>Subject Information</h2>

<div id="loading">Loading Subject information…</div>

<div id="tableWrapper"></div>

</div>

<script>

/* ===== CHANGE THIS WHEN USING JSON ===== */
const API_URL = "data/subject_info.json";

fetch(API_URL)
.then(res => res.json())
.then(data => {

const container = document.getElementById("tableWrapper");

if(!data || data.length===0){
document.getElementById("loading").innerText="No data found";
return;
}

/* ===== GROUP BY DEPARTMENT ===== */

const deptGroups={};

data.forEach(row=>{
const dept=row.Department || "Other";

if(!deptGroups[dept]){
deptGroups[dept]=[];
}

deptGroups[dept].push(row);
});

let html="";

/* ===== CREATE TABLE FOR EACH DEPARTMENT ===== */

Object.keys(deptGroups).forEach(dept=>{

html+=`
<div class="dept-section">

<h3 class="dept-title">${dept}</h3>

<table>

<thead>
<tr>
<th>Sr No</th>
<th>Semester</th>
<th>Subject Code</th>
<th>Subject Acronym</th>
<th>Subject Name</th>
<th>Credits</th>
</tr>
</thead>

<tbody>
`;

deptGroups[dept].forEach((sub,index)=>{

html+=`
<tr>
<td>${index+1}</td>
<td>${sub.Semester || ""}</td>
<td>${sub.SubjectCode || ""}</td>
<td>${sub.SubjectAcr || ""}</td>
<td style="text-align:left">${sub.SubjectName || ""}</td>
<td>${sub.Credits || ""}</td>
</tr>
`;

});

html+=`
</tbody>
</table>
</div>
`;

});

container.innerHTML=html;

document.getElementById("loading").style.display="none";

})

.catch(err=>{
document.getElementById("loading").innerText=
"Error loading data. Please try again.";
console.error(err);
});

</script>

</body>
</html>
